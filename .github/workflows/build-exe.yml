name: Build Windows Setup

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Playwright
      run: |
        python -m playwright install chromium

    - name: Build with PyInstaller (OneDir mode)
      run: |
        pyinstaller --noconfirm --onedir --add-data "app.py;." --add-data "geo_data.py;." --collect-all streamlit --collect-all playwright --name "LeadGenPro_Elite" lanzador_windows.py

    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      shell: powershell

    - name: Upload Setup Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LeadGenPro_Elite_Setup
        path: dist/LeadGenPro_Elite_Setup.exe

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/LeadGenPro_Elite_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

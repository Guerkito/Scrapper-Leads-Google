services:
  api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    network_mode: host
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVO_API_KEY:?Set EVO_API_KEY in .env}
      - LOG_LEVEL=ERROR
      # Base de Datos Directa
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@127.0.0.1:5432/evolution?sslmode=disable
      # Redis Directo
      - REDIS_ENABLED=true
      - REDIS_URI=redis://127.0.0.1:6379
      - REDIS_PREFIX=EVO
      # Optimización de Rendimiento
      - STORE_MESSAGES=false
      - STORE_MESSAGE_UP_DATES=false
      - STORE_CONTACTS=false
      - STORE_CHATS=false
      - INSTANCE_INTEGRATION_BAILEYS=true

  db:
    image: postgres:15-alpine
    restart: always
    network_mode: host
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_v4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  evolution_db_v4:
